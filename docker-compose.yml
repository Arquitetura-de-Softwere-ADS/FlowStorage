services:
  sales-db:
    image: postgres:16
    environment:
      POSTGRES_DB: sales_db
      POSTGRES_USER: sales_user
      POSTGRES_PASSWORD: 123456
    ports:
      - "5434:5432"
    volumes:
      - sales_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_user -d sales_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  sales-service:
    build:
      context: ./services/sales-service
    ports:
      - "8002:8000"
    volumes:
      - ./services/sales-service/app:/app/app
    depends_on:
      sales-db:
        condition: service_healthy
        
  auth-db:
    image: postgres:16
    container_name: flowstorage-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
    container_name: flowstorage-auth-service
    ports:
      - "8001:8001"
    volumes:
      - ./services/auth-service/app:/app/app
    depends_on:
      auth-db:
        condition: service_healthy

  inventory-db:
    image: postgres:16
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: 123456
    ports:
      - "5435:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory-service:
    build:
      context: ./services/inventory-service
    ports:
      - "8003:8000"
    volumes:
      - ./services/inventory-service:/app
    depends_on:
      inventory-db:
        condition: service_healthy

volumes:
  auth_db_data:
  inventory_db_data:
  sales_db_data:
